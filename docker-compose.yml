# Knowledge Node - Docker 构建与部署
# 用法:
#   构建并启动:  docker compose up -d --build
#   仅构建:      docker compose build
#   仅启动:      docker compose up -d
#   查看日志:    docker compose logs -f
#   停止:        docker compose down
# 可选: 复制 .env.example 为 .env 并修改变量

services:
  postgres:
    image: postgres:16-alpine
    container_name: knowledge-node-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_node}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-knowledge_node}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowledge-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 768m
    cpus: "1.0"

  backend:
    build:
      context: ./knowledge-node-backend
      dockerfile: Dockerfile
      args:
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-default}
    image: knowledge-node-backend:latest
    container_name: knowledge-node-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-knowledge-node-internal-key}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-knowledge-node-admin-secret}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-knowledge_node}?schema=public
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      VENUS_API_KEY: ${VENUS_API_KEY:-}
      VENUS_API_URL: ${VENUS_API_URL:-http://v2.open.venus.oa.com/llmproxy}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - knowledge-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 1024m
    cpus: "1.5"

  frontend:
    build:
      context: ./knowledge-node-nextjs
      dockerfile: Dockerfile
      args:
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-default}
        BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:4000}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_VENUS_API_URL: ${NEXT_PUBLIC_VENUS_API_URL:-http://v2.open.venus.oa.com/llmproxy/chat/completions}
        NEXT_PUBLIC_VENUS_MODEL: ${NEXT_PUBLIC_VENUS_MODEL:-gemini-2.5-flash}
    image: knowledge-node-frontend:latest
    container_name: knowledge-node-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:4000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-knowledge-node-internal-key}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-knowledge_node}?schema=public
      VENUS_API_KEY: ${VENUS_API_KEY:-}
      NEXT_PUBLIC_VENUS_API_URL: ${NEXT_PUBLIC_VENUS_API_URL:-http://v2.open.venus.oa.com/llmproxy}
      NEXT_PUBLIC_VENUS_MODEL: ${NEXT_PUBLIC_VENUS_MODEL:-gemini-2.5-flash}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      NEXT_PUBLIC_GEMINI_MODEL: ${NEXT_PUBLIC_GEMINI_MODEL:-gemini-2.5-flash}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - knowledge-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 1536m
    cpus: "2.0"

volumes:
  postgres_data:
    driver: local

networks:
  knowledge-network:
    driver: bridge
