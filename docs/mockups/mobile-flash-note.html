<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多模态闪记 - Nexus Mobile</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }
    
    .back-link {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .phone-frame {
      width: 375px;
      height: 812px;
      background: white;
      border-radius: 40px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.15);
      overflow: hidden;
      position: relative;
    }
    
    .status-bar {
      height: 44px;
      background: #667eea;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      color: white;
      font-size: 14px;
      font-weight: 500;
    }
    
    .status-bar .time {
      font-weight: 600;
    }
    
    .status-bar .icons {
      display: flex;
      gap: 6px;
    }
    
    .header {
      background: #667eea;
      padding: 12px 20px 24px;
      color: white;
    }
    
    .header h1 {
      font-size: 28px;
      font-weight: 700;
    }
    
    .header p {
      font-size: 14px;
      opacity: 0.85;
      margin-top: 4px;
    }
    
    .main-content {
      padding: 20px;
      flex: 1;
      background: #f8f9fa;
    }
    
    .input-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    
    .input-textarea {
      width: 100%;
      min-height: 120px;
      border: none;
      font-size: 16px;
      line-height: 1.6;
      resize: none;
      outline: none;
      color: #333;
    }
    
    .input-textarea::placeholder {
      color: #aaa;
    }
    
    .input-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
    }
    
    .media-buttons {
      display: flex;
      gap: 12px;
    }
    
    .media-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .media-btn:hover {
      transform: scale(1.1);
    }
    
    .media-btn.voice {
      background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
      color: white;
    }
    
    .media-btn.image {
      background: linear-gradient(135deg, #4ecdc4, #44a08d);
      color: white;
    }
    
    .media-btn.tag {
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      color: #667;
    }
    
    .send-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    
    .recent-section {
      margin-top: 24px;
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .section-header h3 {
      font-size: 16px;
      color: #333;
    }
    
    .section-header a {
      font-size: 14px;
      color: #667eea;
      text-decoration: none;
    }
    
    .recent-item {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    
    .recent-item .time {
      font-size: 12px;
      color: #999;
      margin-bottom: 8px;
    }
    
    .recent-item .content {
      font-size: 14px;
      color: #333;
      line-height: 1.5;
    }
    
    .recent-item .tags {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    
    .recent-item .tag {
      background: #f0f0f0;
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 12px;
      color: #666;
    }
    
    .recent-item .tag.ai {
      background: #f3e5f5;
      color: #7b1fa2;
    }
    
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 83px;
      background: white;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 12px;
    }
    
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: #999;
      text-decoration: none;
    }
    
    .tab-item.active {
      color: #667eea;
    }
    
    .tab-item .icon {
      font-size: 24px;
    }
    
    .voice-recording {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 40px 60px;
      border-radius: 20px;
      text-align: center;
      display: none;
    }
    
    .voice-recording.show {
      display: block;
    }
    
    .voice-recording .wave {
      font-size: 48px;
      margin-bottom: 16px;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .description-panel {
      position: fixed;
      right: 20px;
      top: 100px;
      width: 280px;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    .description-panel h3 {
      font-size: 16px;
      color: #333;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .description-panel ul {
      list-style: none;
      font-size: 14px;
      color: #666;
      line-height: 2;
    }
    
    .description-panel ul li::before {
      content: '✓';
      color: #4ecdc4;
      margin-right: 8px;
    }
    
    @media (max-width: 768px) {
      .description-panel {
        display: none;
      }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← 返回导航</a>
  
  <div class="phone-frame">
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="icons">📶 🔋</div>
    </div>
    
    <div class="header">
      <h1>📝 闪记</h1>
      <p>随时随地，捕获灵感</p>
    </div>
    
    <div class="main-content">
      <div class="input-card">
        <textarea class="input-textarea" placeholder="写下你的想法...&#10;&#10;支持语音、图片输入"></textarea>
        <div class="input-actions">
          <div class="media-buttons">
            <button class="media-btn voice" title="语音输入">🎤</button>
            <button class="media-btn image" title="图片输入">📷</button>
            <button class="media-btn tag" title="添加标签">#</button>
          </div>
          <button class="send-btn">发送 ✈️</button>
        </div>
      </div>
      
      <div class="recent-section">
        <div class="section-header">
          <h3>最近记录</h3>
          <a href="#">查看全部</a>
        </div>
        
        <div class="recent-item">
          <div class="time">今天 08:45 · 语音输入</div>
          <div class="content">今天下午和产品团队对齐 Q2 OKR，需要准备竞品分析材料</div>
          <div class="tags">
            <span class="tag">#任务</span>
            <span class="tag ai">✨ 已结构化</span>
          </div>
        </div>
        
        <div class="recent-item">
          <div class="time">昨天 22:30 · 文字输入</div>
          <div class="content">读完《思考，快与慢》第三章，关于锚定效应的描述很有启发...</div>
          <div class="tags">
            <span class="tag">#读书笔记</span>
          </div>
        </div>
      </div>
    </div>
    
    <div class="tab-bar">
      <a href="mobile-flash-note.html" class="tab-item active">
        <span class="icon">📝</span>
        <span>闪记</span>
      </a>
      <a href="mobile-daily-note.html" class="tab-item">
        <span class="icon">📅</span>
        <span>每日</span>
      </a>
      <a href="mobile-notebook.html" class="tab-item">
        <span class="icon">📚</span>
        <span>笔记本</span>
      </a>
      <a href="mobile-ai-command.html" class="tab-item">
        <span class="icon">🤖</span>
        <span>AI 指令</span>
      </a>
    </div>
  </div>
  
  <div class="description-panel">
    <h3>📝 多模态闪记</h3>
    <ul>
      <li>首屏即输入框，零摩擦</li>
      <li>支持文字、语音、图片</li>
      <li>3 步内完成记录</li>
      <li>自动同步到云端</li>
      <li>后台 Agent 自动结构化</li>
    </ul>
  </div>
</body>
</html>
